name: Compile ESP32 Firmware

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Compile Firmware
        # Dieser Befehl baut den Code und führt automatisch deine Python-Skripte 
        # (Chart.js Download & Merged-Bin Erstellung) aus.
        run: pio run

      - name: Package Firmware
        run: |
          mkdir release_files
          # Wir kopieren NUR die neue, sichere Merged-Datei in den Release-Ordner
          cp LilyGo_Gotchi_Full_Merged.bin release_files/
          cd release_files
          zip -j LilyGo_Gotchi_Firmware.zip LilyGo_Gotchi_Full_Merged.bin

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          files: release_files/LilyGo_Gotchi_Firmware.zip