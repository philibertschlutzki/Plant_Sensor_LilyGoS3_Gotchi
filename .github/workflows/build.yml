name: Compile ESP32 Firmware

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PlatformIO
        uses: actions/cache@v3
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Install esptool
        run: pip install esptool

      - name: Compile Firmware & Filesystem
        run: |
          pio run -t buildfs -e lilygo-t-display-s3
          pio run -e lilygo-t-display-s3

      - name: Verify merged binary
        run: |
          ls -lh LilyGo_Gotchi_Full_Merged.bin
          SIZE=$(stat -c%s LilyGo_Gotchi_Full_Merged.bin)
          echo "Merged binary size: $SIZE bytes"
          [ "$SIZE" -gt 13631488 ] || (echo "ERROR: Binary zu klein – LittleFS fehlt im Merge!" && exit 1)

      - name: Package Firmware
        run: |
          mkdir release_files
          cp LilyGo_Gotchi_Full_Merged.bin release_files/
          cd release_files
          zip -j LilyGo_Gotchi_Firmware.zip LilyGo_Gotchi_Full_Merged.bin

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          files: release_files/LilyGo_Gotchi_Firmware.zip
