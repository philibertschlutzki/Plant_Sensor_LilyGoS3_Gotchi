[env:lilygo-t-display-s3]
platform = espressif32 @ ~6.5.0
board = lilygo-t-display-s3
framework = arduino
monitor_speed = 115200

board_build.filesystem = littlefs
board_build.partitions = partitions_16MB_no_ota.csv   # <-- NEU

lib_deps = 
    bodmer/TFT_eSPI@^2.5.31
    h2zero/NimBLE-Arduino@^1.4.1
    wnatth3/WiFiManager@^2.0.16-rc.2
    bblanchon/ArduinoJson@^7.0.4
    https://github.com/mathieucarbou/AsyncTCP.git
    https://github.com/mathieucarbou/ESPAsyncWebServer.git
    ayushsharma82/ElegantOTA@^3.1.7

lib_ldf_mode = deep+

extra_scripts = 
    pre:download_chartjs.py
    post:build_merged_bin.py

build_flags = 
    -D ELEGANTOTA_USE_ASYNC_WEBSERVER=1
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D CGRAM_OFFSET=1
    -D TFT_RGB_ORDER=TFT_BGR
    -D TFT_INVERSION_ON=1
    -D TFT_PARALLEL_8_BIT=1
    -D TFT_WIDTH=170
    -D TFT_HEIGHT=320
    -D TFT_CS=6
    -D TFT_DC=7
    -D TFT_RST=5
    -D TFT_WR=8
    -D TFT_RD=9
    -D TFT_D0=39
    -D TFT_D1=40
    -D TFT_D2=41
    -D TFT_D3=42
    -D TFT_D4=45
    -D TFT_D5=46
    -D TFT_D6=47
    -D TFT_D7=48
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D SMOOTH_FONT=1
